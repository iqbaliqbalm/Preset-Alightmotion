<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tab-JJ-Full-Bass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-100 font-sans">

    <header class="p-6 bg-gray-800 border-b border-gray-700 sticky top-0 z-10">
        <div class="max-w-4xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold text-blue-400"><i class="fas fa-clapperboard mr-2"></i>JJ-Full-Bass</h1>
            <input type="text" id="searchInput" placeholder="Cari preset..." 
                class="w-full md:w-64 p-2 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-500">
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-6">
        <div id="presetContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            </div>
    </main>

    <script>
        // DATA PRESET (Edit bagian ini untuk menambah link)
        const presets = [
            { title: "JJ Tipis Smooth", category: "01", link: "https://alight.link/EHoneFJF2BGyFtij6", date: "2026-03-24" },
            { title: "Velocity Slowmo", category: "03", link: "https://alight.link/yyyyy", date: "2026-03-22" },
            { title: "Text Glow Neon", category: "02", link: "https://alight.link/zzzzz", date: "2026-03-25" },
            { title: "Preset 5MB - Sound Kane", category: "04", link: "https://alight.link/aaaaa", date: "2026-03-28" },
        ];

        const container = document.getElementById('presetContainer');
        const searchInput = document.getElementById('searchInput');

        function displayPresets(data) {
            container.innerHTML = '';
            data.forEach(item => {
                const card = `
                    <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 hover:border-blue-500 transition-all">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-xs font-semibold px-2 py-1 bg-blue-900 text-blue-300 rounded">${item.category}</span>
                            <span class="text-[10px] text-gray-400">${item.date}</span>
                        </div>
                        <h3 class="text-lg font-medium mb-4">${item.title}</h3>
                        <div class="flex gap-2">
                            <a href="${item.link}" target="_blank" 
                                class="flex-1 bg-blue-600 hover:bg-blue-700 text-center py-2 rounded-lg text-sm font-bold transition">
                                Buka di AM
                            </a>
                            <button onclick="copyLink('${item.link}')" 
                                class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg">
                                <i class="fas fa-copy"></i>
                            </button>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        // Fungsi Cari
        searchInput.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = presets.filter(p => p.title.toLowerCase().includes(val) || p.category.toLowerCase().includes(val));
            displayPresets(filtered);
        });

        // Fungsi Copy
        function copyLink(text) {
            navigator.clipboard.writeText(text);
            alert('Link berhasil disalin!');
        }

        // Jalankan saat pertama load
        displayPresets(presets);
    </script>
</body>
</html>
